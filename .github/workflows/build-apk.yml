name: Build CAUSAL-ONE Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi, i686-linux-android, x86_64-linux-android

      - run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf imagemagick gradle

      - run: |
          npm install @tauri-apps/api@^2.0.0 --save
          npm install
          npm run build

      - run: cargo install tauri-cli --version 2.2.3 --locked

      - run: rm -rf src-tauri/gen

      - working-directory: src-tauri
        run: cargo tauri android init --ci

      - run: cargo tauri android build --apk --ci

      - uses: actions/upload-artifact@v4
        with:
          name: CAUSAL-ONE-APK-${{ github.run_number }}
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          retention-days: 30
          if-no-files-found: error
