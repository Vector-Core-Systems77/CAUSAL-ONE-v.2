name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    # الآن بيشتغل لحاله مع كل push + تقدر تشغله يدوي

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      actions: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi, i686-linux-android, x86_dart-android

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf imagemagick

      - name: Create placeholder frontend
        run: |
          mkdir -p dist
          echo '<!DOCTYPE html><html><head><title>Causal One</title><meta charset="utf-8"></head><body><h1>Causal One - HPT Engine</h1></body></html>' > dist/index.html

      - name: Install npm deps
        run: npm install @tauri-apps/api@2.2.3

      - name: Build frontend
        run: npm run build

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version 2.2.3 --locked

      - name: Remove old Android project
        run: rm -rf src-tauri/gen/android

      - name: Init Android project
        run: cd src-tauri && cargo tauri android init --ci

      - name: Create placeholder icon
        run: |
          mkdir -p src-tauri/icons
          magick -size 256x256 xc:#1a1a2e -gravity center -pointsize 80 -fill white -annotate +0+0 "C1" src-tauri/icons/icon.png

      - name: Build Android APK
        run: cargo tauri android build --apk --ci

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CausalOne-APK
          path: src-tauri/gen/android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
