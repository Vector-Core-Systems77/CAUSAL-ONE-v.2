name: Build CAUSAL-ONE Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi, i686-linux-android, x86_64-linux-android

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf imagemagick

      - name: Create placeholder icon
        run: |
          mkdir -p src-tauri/icons
          convert -size 256x256 xc:blue -type TrueColorAlpha PNG32:src-tauri/icons/icon.png

      - name: Fix Tauri API version
        run: npm install @tauri-apps/api@^2.0.0 --save

      - name: Install npm dependencies
        run: npm install

      - name: Build Frontend
        run: npm run build

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version 2.2.3 --locked

      - name: Initialize Android project
        run: cargo tauri android init --ci || echo "Android project already exists"

      - name: Build APK
        run: cargo tauri android build --apk --ci

      - name: Find and Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CAUSAL-ONE-APK-${{ github.run_number }}
          path: src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk
          retention-days: 30
